stages:
  - lint
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  image: python:3.11-slim
  tags: [cryptotrader]
  script:
    - pip install --quiet ruff
    - ruff check cryptotrader/ tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

test:
  stage: test
  image: python:3.11-slim
  tags: [cryptotrader]
  script:
    - pip install --quiet -e ".[dev]"
    - pytest tests/ -v --tb=short --cov=cryptotrader --cov-report=term-missing --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

deploy:
  stage: deploy
  tags: [cryptotrader]
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - eval $(ssh-agent -s)
    - echo "$PI_SSH_PRIVATE_KEY" | base64 -d > /tmp/pi_key
    - chmod 600 /tmp/pi_key
    - ssh-add /tmp/pi_key
    - rm /tmp/pi_key
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$PI_HOST" >> ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
  script:
    - bash deploy/deploy.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual   # run manually via GitLab UI until runner is configured
  environment:
    name: production
    url: http://pihole.homelab.com
