name: CI

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install --quiet ruff
      - run: ruff check cryptotrader/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install --quiet -e ".[dev]"
      - run: pytest tests/ -v --tb=short --cov=cryptotrader --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=report.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            coverage.xml
            report.xml
