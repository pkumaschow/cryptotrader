[mode]
# Set to "test" for paper trading with statistics.
# Set to "production" to execute real trades on Kraken.
active = "test"

[database]
path = "cryptotrader.db"

[websocket]
# Seconds without a price tick before reconnecting
stale_threshold = 30
# Stats panel refresh interval (seconds)
stats_refresh_interval = 5

[currencies."BTC/USD"]
strategy = "threshold"
buy_trigger = 68000.00
sell_trigger = 69500.00
quantity = 0.001

[currencies."ETH/USD"]
strategy = "threshold"
buy_trigger = 2040.00
sell_trigger = 2100.00
quantity = 0.05
