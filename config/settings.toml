[mode]
# Set to "test" for paper trading with statistics.
# Set to "production" to execute real trades on Kraken.
active = "test"

[database]
path = "cryptotrader.db"

[websocket]
# Seconds without a price tick before reconnecting
stale_threshold = 30
# Stats panel refresh interval (seconds)
stats_refresh_interval = 5

[currencies."BTC/USD"]
strategy = "threshold"
buy_trigger = 70000.00   # above current ~68645 → BUY fires immediately
sell_trigger = 68000.00  # below current bid → SELL fires immediately after BUY
quantity = 0.001

[currencies."ETH/USD"]
strategy = "threshold"
buy_trigger = 2100.00    # above current ~2063 → BUY fires immediately
sell_trigger = 2050.00   # below current bid → SELL fires immediately after BUY
quantity = 0.05
